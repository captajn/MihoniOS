workflows:
  # ─────────────────────────────────────────────────────────────────────────────
  # Mihon iOS — Preview (.app simulator) + unsigned IPA (sideload)
  #
  # Repo:    https://github.com/captajn/MihoniOS
  # Layout:  App / Features / Core / Domain / Data / … (XcodeGen)
  # Min iOS: 16.0
  # Scheme:  Mihon
  # Bundle:  app.mihon.ios
  #
  # Version source of truth: project.yml MARKETING_VERSION
  # Override: VERSION_OVERRIDE / BUILD_OVERRIDE env when starting a build
  # ─────────────────────────────────────────────────────────────────────────────
  ios-build:
    name: Mihon iOS (Preview + Sideload)
    max_build_duration: 90
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    cache:
      cache_paths:
        - $HOME/Library/Caches/org.swift.swiftpm
        - $HOME/Library/Caches/clang
    environment:
      xcode: "16.4"
      vars:
        XCODE_PROJECT: Mihon.xcodeproj
        XCODE_SCHEME: Mihon
        BUNDLE_ID: app.mihon.ios
        APP_NAME: Mihon
        DEFAULT_VERSION: "0.1.0"
        BASELINE_BUILD: "1"
        # VERSION_OVERRIDE: "0.2.0"
        # BUILD_OVERRIDE: "10"
    scripts:
      - name: Install xcodegen
        script: |
          set +e
          # brew has been unreliable on this build machine (reused CI instance leaves a
          # corrupted /opt/homebrew/Cellar/xcodegen entry that `rm` alone can't clear —
          # "Error: ... is not a directory" on every pour, even after removing it first).
          # Skip brew entirely: download the prebuilt XcodeGen.app bundle from GitHub
          # Releases and symlink its CLI binary — no Cellar involved, fully self-contained.
          XG_VERSION="2.46.0"
          curl -fL -o /tmp/xcodegen.zip \
            "https://github.com/yonaskolb/XcodeGen/releases/download/${XG_VERSION}/xcodegen.zip" \
            > xcodegen-install.log 2>&1
          unzip -oq /tmp/xcodegen.zip -d /tmp/xcodegen-extracted >> xcodegen-install.log 2>&1
          sudo mkdir -p /usr/local/bin
          sudo ln -sf /tmp/xcodegen-extracted/xcodegen.app/Contents/MacOS/xcodegen /usr/local/bin/xcodegen
          export PATH="/usr/local/bin:$PATH"
          if ! which xcodegen > /dev/null 2>&1 || ! xcodegen version > /dev/null 2>&1; then
            echo "⚠️ Direct binary install failed, falling back to brew..." | tee -a xcodegen-install.log
            sudo rm -rf /opt/homebrew/Cellar/xcodegen 2>&1 | tee -a xcodegen-install.log
            brew install xcodegen >> xcodegen-install.log 2>&1
          fi
          cat xcodegen-install.log
          which xcodegen || { echo "❌ xcodegen not installed"; exit 1; }
          xcodegen version
          exit 0
      - name: Generate Xcode project
        script: |
          xcodegen generate
          test -d "$XCODE_PROJECT" || { echo "❌ Missing $XCODE_PROJECT"; exit 1; }
          echo "✅ Generated $XCODE_PROJECT"
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -derivedDataPath build/DerivedData
      - name: Compute version + build number
        script: |
          set +e
          PROJECT_VERSION=$(grep -E '^\s+MARKETING_VERSION:' project.yml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          if [ -n "$PROJECT_VERSION" ]; then
            DEFAULT_VERSION="$PROJECT_VERSION"
            echo "📋 project.yml MARKETING_VERSION = $PROJECT_VERSION"
          else
            echo "⚠️  Fallback DEFAULT_VERSION=$DEFAULT_VERSION"
          fi
          set -e

          if [ -n "$VERSION_OVERRIDE" ]; then
            VERSION="$VERSION_OVERRIDE"
            echo "✅ VERSION_OVERRIDE=$VERSION"
          else
            VERSION="$DEFAULT_VERSION"
          fi

          if [ -n "$BUILD_OVERRIDE" ]; then
            BUILD="$BUILD_OVERRIDE"
          else
            TS=$(($(date +%s) % 100000))
            if [ "$TS" -lt "$BASELINE_BUILD" ]; then
              BUILD="$BASELINE_BUILD"
            else
              BUILD="$TS"
            fi
          fi

          echo "VERSION=$VERSION" >> $CM_ENV
          echo "BUILD=$BUILD" >> $CM_ENV
          echo "🎯 FINAL: $VERSION+$BUILD"
      - name: Download Metal Toolchain (if needed)
        script: |
          xcodebuild -downloadComponent MetalToolchain 2>&1 || true
      - name: Build .app for iOS Simulator (App Preview)
        script: |
          set +e
          set -o pipefail
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build/DerivedData \
            -parallelizeTargets \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            ARCHS=arm64 \
            EXCLUDED_ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD" \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee build-sim.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "=========================================="
            echo "BUILD FAILED (exit $EXIT) — error: lines:"
            echo "=========================================="
            grep -nE "error:" build-sim.log | head -200 || true
            tail -300 build-sim.log
            exit $EXIT
          fi
      - name: Build unsigned archive (Sideload)
        script: |
          set +e
          set -o pipefail
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/Mihon.xcarchive \
            -derivedDataPath build/DerivedData \
            -parallelizeTargets \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 2>&1 | tee build-archive.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "=========================================="
            echo "ARCHIVE FAILED (exit $EXIT) — error: lines:"
            echo "=========================================="
            grep -nE "error:" build-archive.log | head -200 || true
            tail -300 build-archive.log
            exit $EXIT
          fi
      - name: Package unsigned IPA
        script: |
          mkdir -p build/Payload
          cp -r build/Mihon.xcarchive/Products/Applications/Mihon.app build/Payload/
          cd build
          zip -qry mihon.ipa Payload
          cp mihon.ipa "mihon-v${VERSION}.ipa"
          rm -rf Payload
          ls -lh *.ipa
    artifacts:
      - build/DerivedData/Build/Products/Debug-iphonesimulator/*.app
      - build/mihon.ipa
      - build/mihon-v*.ipa
      - build/Mihon.xcarchive
      - build-sim.log
      - build-archive.log
      - xcodegen-install.log
